name: Sync News from Google Sheets

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC = 08:00 SAST
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news from Google Sheets
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: node scripts/fetch-news.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html news.html assets/news-images/
          git diff --staged --quiet || git commit -m "chore: sync news from Google Sheets [skip ci]"
          git push
